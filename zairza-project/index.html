<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>coffee peena hai yara</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Story+Script&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: bisque;">
    <!--bisque -->

    <div class="container">

        <div class="logo">
            <h1>Café</h1>
        </div>
        <nav class="navbar">
            <ul class="nav-links">
                <li><a href="#">About</a></li>
                <li><a href="#popular-items">Popular Items</a></li>
                <li><a href="#">Find us</a></li>
                <li><a href="#">Contact us</a></li>
            </ul>
        </nav>
    
    </div>

    <div class="slideshow">
        <button id="prev" class="nav-btn">←</button>
        <img id="slide" src="https://pin.it/2gtPZmrs5" alt="pic1">
        <button id="next" class="nav-btn">→</button>
    </div>

    <section class="menu" id="popular-items">
        <h2>Popular items</h2>

        <div class="carousel-container">
            <button id="left">←</button>
            <div class="carousel">
                <div class="card">
                <img src="https://www.cookwithkushi.com/wp-content/uploads/2016/07/best_white_sauce_pasta_bechamel_sauce.jpg" alt="white-sauce-pasta">
                <h3>White sauce pasta</h3>
                <p>₹250</p>
                </div>

                <div class="card">
                <img src="https://food.fnr.sndimg.com/content/dam/images/food/fullset/2014/4/8/2/FNM_050114-Classic-Red-Sauce-Recipe_s4x3.jpg.rend.hgtvcom.826.620.suffix/1397491331300.webp" alt="red-sauce-pasta">
                <h3>red sauce pasta</h3>
                <p>₹200</p>
                </div>
                
                <div class="card">
                <img src="https://images.immediate.co.uk/production/volatile/sites/30/2020/08/cheeseboard-macaroni-cheese-9690c2f.jpg?quality=90&webp=true&resize=440,400" alt="macaroni">
                <h3>Cheese Macaroni</h3>
                <p>₹150</p>
                </div>

                <div class="card">
                <img src="https://static01.nyt.com/images/2024/10/03/multimedia/ZS-Chile-Cheese-Toastrex-phlv/ZS-Chile-Cheese-Toastrex-phlv-superJumbo.jpg?format=pjpg&quality=75&auto=webp&disable=upscale" alt="Cheese-toast">
                <h3>Cheese toast</h3>
                <p>₹120</p>
                </div>
            </div>

            <button id="right">→</button>
        </div>
    </section>
</body>
<script>
    const images = [
    "https://drive.google.com/file/d/1ZbjehujwIQmVuaAXEthbQnf6FJ17ZJL8/view?usp=drive_link",
    "https://drive.google.com/file/d/1hiwipLMJ7cyeIJKGuykfrTRhErEHwehk/view?usp=drive_link",
    "https://drive.google.com/file/d/1NpHsAJ9AW0P9cPOSqMMePtOeRpwDRdQK/view?usp=drive_link"
    ];

    let current = 0;

    const slide = document.getElementById("slide");

    document.getElementById("next").addEventListener("click", () => {
        current = (current + 1) % images.length;
        slide.src = images[current];
    });

    document.getElementById("prev").addEventListener("click", () => {
        current = (current - 1 + images.length) % images.length;
        slide.src = images[current];
    });

    const carousel = document.querySelector(".carousel");

    document.getElementById("right").onclick = () => {
        carousel.scrollBy({
            left: 300,
            behavior: "smooth"
        });
    };

    document.getElementById("left").onclick = () => {
        carousel.scrollBy({
            left: -300,
            behavior: "smooth"
        });
    };
</script>
</html>
