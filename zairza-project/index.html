</body>
<script>
    const images = [
    "images/img1.png",
    "images/img2.jpeg",
    "images/img3.jpeg"
    ];

    let current = 0;
    const slideA = document.getElementById('slideA');
    const slideB = document.getElementById('slideB');
    let visible = slideA;
    let hidden = slideB;
    visible.style.opacity = 1;
    visible.style.zIndex = 2;
    hidden.style.opacity = 0;
    hidden.style.zIndex = 1;

    function changeImage(newIndex) {
        if (newIndex === current) return;
        hidden.src = images[newIndex];
        hidden.style.zIndex = 3;
        visible.style.zIndex = 2;
        // force reflow then start crossfade
        void hidden.offsetWidth;
        hidden.style.opacity = 1;
        visible.style.opacity = 0;

        hidden.addEventListener('transitionend', function handler(e) {
            if (e.propertyName !== 'opacity') return;
            hidden.removeEventListener('transitionend', handler);
            const tmp = visible;
            visible = hidden;
            hidden = tmp;
            hidden.style.zIndex = 1;
            visible.style.zIndex = 2;
            current = newIndex;
        }, { once: true });
    }

    document.getElementById("next").addEventListener("click", () => {
        changeImage((current + 1) % images.length);
    });

    document.getElementById("prev").addEventListener("click", () => {
        changeImage((current - 1 + images.length) % images.length);
    });

    const carousel = document.querySelector(".carousel");

    document.getElementById("right").onclick = () => {
        carousel.scrollBy({
            left: 300,
            behavior: "smooth"
        });
    };

    document.getElementById("left").onclick = () => {
        carousel.scrollBy({
            left: -300,
            behavior: "smooth"
        });
    };
</script>
